# ── DEPLOY.YML ──
# This is the GitHub Actions CI/CD Pipeline file.
# GitHub reads this automatically every time you push to main.

name: Build and Deploy
# name: what this workflow is called in the GitHub Actions tab

# ── TRIGGER ──
on:
  push:
    branches:
      - main
# on.push.branches: runs automatically when you push to main
# any push to other branches is ignored

jobs:
  build-and-deploy:
  # build-and-deploy: the name of our single job

    runs-on: ubuntu-latest
    # runs-on: GitHub provides a fresh Ubuntu VM to run this job
    # it's created fresh every run, then destroyed when done

    permissions:
      contents: read
      # read: allows the job to read your repo code
      packages: write
      # write: allows pushing Docker images to GitHub Container Registry

    steps:
    # steps: list of actions this job runs in order

    # ── STEP 1: Checkout code ──
    - name: Checkout repository
      uses: actions/checkout@v4
      # downloads your repo code onto the Ubuntu VM

    # ── STEP 2: Log in to GitHub Container Registry ──
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        # ghcr.io = GitHub Container Registry address
        username: ${{ github.actor }}
        # github.actor = your GitHub username (set automatically)
        password: ${{ secrets.GHCR_TOKEN }}
        # secrets.GHCR_TOKEN = your token stored in GitHub secrets
        # secrets are never shown in logs — GitHub hides them

    # ── STEP 3: Build Docker image ──
    # ── THIS IS CI (Continuous Integration) ──
    - name: Build Docker image
      run: |
        docker build -t ghcr.io/walterroman/k8s-mac-project:latest .
      # docker build = reads Dockerfile and builds the image
      # -t = tag (name) for the image
      # . = use the Dockerfile in the current folder

    # ── STEP 4: Push Docker image ──
    # ── THIS IS STILL CI ──
    - name: Push Docker image
      run: |
        docker push ghcr.io/walterroman/k8s-mac-project:latest
      # uploads the built image to GitHub Container Registry